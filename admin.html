<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            padding: 30px;
        }

        .container {
            width: 900px;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, .2);
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: green;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            background: #0b7d0b;
        }

        #productList {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .card {
            border: 1px solid #ddd;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 8px;
        }

        .editBtn {
            background: orange;
            margin-top: 10px;
        }

        .deleteBtn {
            background: red;
            margin-top: 10px;
        }
    </style>

</head>

<body>

    <div class="container">

        <h2>Admin Panel</h2>

        <input type="text" id="name" placeholder="Product Name">

        <input type="number" id="price" placeholder="Product Price">

        <input type="text" id="image" placeholder="Image URL">

        <button id="saveBtn">
            Save Product
        </button>

        <div id="productList">

        </div>

    </div>

    <script type="module" src="admin.js"></script>

</body>

</html>
